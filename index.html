<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#78c8ff" />
    <meta
      name="description"
      content="찬슬이와 Aslak이 함께 쓰는 귀여운 한국어/노르웨이어 낱말퀴즈 PWA"
    />
    <link rel="icon" type="image/svg+xml" href="/icons/app-icon.svg" />
    <link rel="apple-touch-icon" href="/icons/app-icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>찬슬이와 Aslak의 재미있는 vocabulary quiz</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if (
        'serviceWorker' in navigator &&
        ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname)
      ) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          registrations.forEach((registration) => registration.unregister());

          if (navigator.serviceWorker.controller && !sessionStorage.getItem('dev-sw-cleaned')) {
            sessionStorage.setItem('dev-sw-cleaned', 'true');
            window.location.reload();
          }
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
